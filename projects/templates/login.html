<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login Page</h2>

<form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>

<br>

<p>
    Don't have an account?
   <a href="{% url 'signup' %}">Create new account</a> 
</p>

</body>
</html>
